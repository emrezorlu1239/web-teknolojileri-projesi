                <h1 class="section-title text-center mb-5">İletişim</h1>
                <div class="card">
                    <div class="card-body p-5">
                        <form id="iletisimForm" class="form-container">
                            <div class="mb-3">
                                <label for="ad" class="form-label">Adınız</label>
                                <input type="text" class="form-control" id="ad" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-posta Adresiniz</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="mesaj" class="form-label">Mesajınız</label>
                                <textarea class="form-control" id="mesaj" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Gönder</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
